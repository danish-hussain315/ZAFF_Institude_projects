<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .flex{
            background-color: bisque;
            display: flex;
            height: 100vh;
            gap: 15px;
            position: relative;
        }
        .box{
            width: 100px;
            height: 100px;
        }
        .box1{
            background-color: blue;
        }
        .box2{
            background-color: blueviolet;
            position: absolute;
            top: 300px;

        }
        .box3{
            background-color: chartreuse;
        }
        .box4{
            background-color: dodgerblue;
        }
        .second{
            height: 100vh;
            background-color: aqua;
        }

    </style>
</head>
<body>
    <div class="flex">
        <div class="box box1">boxs</div>
        <div class="box box2">boxs</div>
        <div class="box box3">boxs</div>
        <div class="box box4">boxs</div>
    </div>
    <div class="second"></div>
</body>
</html>
