<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .main{
      width: 300px;
      height: 400px;

      z-index: 1;
      overflow: hidden;
      position: relative;
    }
    .main:hover img, .main:hover .h2{
      transform: scale(1.1);
      visibility: visible;
    }
    img{
      width: 100%;
      height: 100%;
      
    }
    /* .main:hover .h2{
      visibility: visible;
    } */

    .h2{
      position: absolute;
      /* top: 20px; */
      bottom: 0px;
      visibility: hidden;
    }
  </style>
</head>
<body>
  <div class="main">
    <img src="../colorlib/assets/2nd product.jpg" alt="">
    <div class="h2">
      <h2>Danish</h2>
      <h4>this is great</h4>
   </div>
  </div>
  
  
  
  

  
</body>
</html>
